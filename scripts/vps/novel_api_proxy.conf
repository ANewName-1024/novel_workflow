# === Novel Workflow API proxy (2026-07-03) ===
    # Forward novel's /api/* calls to review_ui (9180) WITHOUT auth-verify
    # Must be placed BEFORE `location ^~ /api/` so this regex wins
    location ~ ^/api/(projects|stats|llm|chapter|pipeline|entities|outline|comments|review|book|approve|reject|edit|diff|history|queue|config|notifications|upload|export|import|users|search|login|logout|me|health)(/|$|\?) {
        proxy_pass http://127.0.0.1:9180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /novel-api;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering off;
    }