<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0e1217">
<title>{{ title }} - 小说评审台</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
<style>
/* error.html 独立布局 — 顶部简洁 header + 居中错误卡 */
body.error-page {
  margin: 0; min-height: 100vh;
  display: flex; flex-direction: column;
}
body.error-page header.error-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--panel);
  display: flex; align-items: center; gap: 12px;
}
.error-back {
  color: var(--accent); text-decoration: none; font-size: 14px;
  padding: 8px 12px; min-height: 44px;
  display: inline-flex; align-items: center; border-radius: 6px;
}
.error-back:hover { background: var(--panel2); }
.error-main {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 24px 20px;
}
.error-card {
  max-width: 480px; width: 100%;
  background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  padding: 32px 24px; text-align: center;
}
.error-code {
  font-size: 72px; font-weight: 800; margin: 0;
  color: var(--accent);
}
.error-code.err { color: var(--crit); }
.error-title { font-size: 20px; font-weight: 600; margin: 8px 0 12px; }
.error-message {
  color: var(--muted); font-size: 15px; margin: 16px 0;
  word-break: break-word;
}
.error-detail {
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 12px; color: var(--muted);
  background: var(--panel2); border: 1px solid var(--border); border-radius: 6px;
  padding: 10px 12px; margin-top: 16px; word-break: break-all;
  text-align: left;
}
.error-actions { display: flex; gap: 12px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
.error-actions .btn {
  display: inline-flex; align-items: center; justify-content: center;
  min-height: 44px; padding: 12px 20px; border-radius: 6px;
  text-decoration: none; font-size: 15px; font-weight: 500;
  border: 1px solid var(--border); background: var(--panel2); color: var(--text);
  transition: all 0.15s; cursor: pointer;
}
.error-actions .btn:active { transform: translateY(1px); }
.error-actions .btn.primary { background: var(--accent); color: #0e1217; border-color: var(--accent); font-weight: 600; }
.error-actions .btn.primary:hover { background: #6cb4ff; }
.error-icon { font-size: 32px; margin-bottom: 8px; }

@media (max-width: 720px) {
  .error-card { padding: 24px 16px; }
  .error-code { font-size: 56px; }
  .error-title { font-size: 18px; }
  .error-main { padding: 16px; }
}
</style>
</head>
<body class="error-page">
<header class="error-header">
  <a href="/" class="error-back">← 返回首页</a>
</header>
<main class="error-main">
  <div class="error-card">
    {% if code == 404 %}
    <div class="error-icon">🔍</div>
    {% elif code == 500 %}
    <div class="error-icon">⚠️</div>
    {% else %}
    <div class="error-icon">❌</div>
    {% endif %}
    <h1 class="error-code {% if code >= 500 %}err{% endif %}">{{ code }}</h1>
    <div class="error-title">{{ title }}</div>
    <div class="error-message">{{ message }}</div>
    {% if detail %}
    <div class="error-detail">{{ detail }}</div>
    {% endif %}
    <div class="error-actions">
      <a href="/" class="btn primary">📚 返回首页</a>
      <a href="javascript:location.reload()" class="btn">🔄 刷新</a>
    </div>
  </div>
</main>
</body>
</html>
