<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} - 小说评审台</title>
<style>
:root {
  --bg: #0e1217; --panel: #161b22; --panel2: #1c232c; --border: #2a3440;
  --text: #d6dde6; --muted: #7d8a9a; --accent: #4ea3ff;
  --warn: #ffb454; --crit: #ff6b6b; --ok: #6dd99b;
}
* { box-sizing: border-box; }
body {
  margin: 0; min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei UI", "PingFang SC", sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6;
  display: flex; flex-direction: column;
}
header {
  padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--panel);
  display: flex; align-items: center; gap: 12px;
}
.back { color: var(--accent); text-decoration: none; font-size: 14px; padding: 8px 12px; min-height: 44px; display: inline-flex; align-items: center; }
.back:active { background: var(--panel2); border-radius: 6px; }
main {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 24px 20px;
}
.error-card {
  max-width: 480px; width: 100%;
  background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  padding: 32px 24px; text-align: center;
}
.error-code {
  font-size: 72px; font-weight: 800; margin: 0;
  color: var(--accent);
}
.error-code.err { color: var(--crit); }
.error-title { font-size: 20px; font-weight: 600; margin: 8px 0 12px; }
.error-message {
  color: var(--muted); font-size: 15px; margin: 16px 0;
  word-break: break-word;
}
.error-detail {
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 12px; color: var(--muted);
  background: var(--panel2); border: 1px solid var(--border); border-radius: 6px;
  padding: 10px 12px; margin-top: 16px; word-break: break-all;
  text-align: left;
}
.actions { display: flex; gap: 12px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  min-height: 44px; padding: 12px 20px; border-radius: 6px;
  text-decoration: none; font-size: 15px; font-weight: 500;
  border: 1px solid var(--border); background: var(--panel2); color: var(--text);
  transition: all 0.15s; cursor: pointer;
}
.btn:active { transform: translateY(1px); }
.btn.primary { background: var(--accent); color: #0e1217; border-color: var(--accent); font-weight: 600; }
.btn.primary:hover { background: #6cb4ff; }
.icon { font-size: 32px; margin-bottom: 8px; }
@media (max-width: 600px) {
  .error-card { padding: 24px 16px; }
  .error-code { font-size: 56px; }
  .error-title { font-size: 18px; }
  main { padding: 16px; }
}
</style>
</head>
<body>
<header>
  <a href="/" class="back">← 返回首页</a>
</header>
<main>
  <div class="error-card">
    {% if code == 404 %}
    <div class="icon">🔍</div>
    {% elif code == 500 %}
    <div class="icon">⚠️</div>
    {% else %}
    <div class="icon">❌</div>
    {% endif %}
    <h1 class="error-code {% if code >= 500 %}err{% endif %}">{{ code }}</h1>
    <div class="error-title">{{ title }}</div>
    <div class="error-message">{{ message }}</div>
    {% if detail %}
    <div class="error-detail">{{ detail }}</div>
    {% endif %}
    <div class="actions">
      <a href="/" class="btn primary">📚 返回首页</a>
      <a href="javascript:location.reload()" class="btn">🔄 刷新</a>
    </div>
  </div>
</main>
</body>
</html>
