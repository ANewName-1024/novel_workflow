<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0e1217">
<title>登录 - 小说评审台</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
<style>
/* login 页面独立设计 — 居中卡片, 不需要 nav */
body.login-page {
  margin: 0; min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.login-box {
  width: 100%; max-width: 360px;
  background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  padding: 32px 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.login-box h1 { margin: 0 0 8px; font-size: 22px; text-align: center; }
.login-box .sub { color: var(--muted); font-size: 13px; text-align: center; margin-bottom: 24px; }
.login-box label {
  display: block; font-size: 13px; color: var(--muted);
  margin: 14px 0 6px;
}
.login-box input[type=text], .login-box input[type=password] {
  width: 100%; padding: 12px 14px; font-size: 15px;
  background: var(--panel2); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  font-family: inherit;
}
.login-box input:focus { outline: none; border-color: var(--accent); }
.login-box button {
  width: 100%; padding: 14px; margin-top: 22px;
  background: var(--accent); color: white; border: 0; border-radius: 6px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  font-family: inherit; min-height: 48px;
  transition: filter 0.15s;
}
.login-box button:hover { filter: brightness(1.1); }
.login-box button:active { transform: scale(0.98); }
.login-box .err {
  margin-top: 18px; padding: 10px 12px;
  background: rgba(255,107,107,0.15); color: var(--crit);
  border-radius: 6px; font-size: 13px; text-align: center;
}
.login-box .hint {
  margin-top: 20px; padding-top: 18px;
  border-top: 1px dashed var(--border);
  font-size: 12px; color: var(--muted); text-align: center; line-height: 1.6;
}
.login-box .hint code {
  background: var(--panel2); padding: 2px 6px; border-radius: 3px;
  font-family: ui-monospace, Consolas, monospace;
}
</style>
</head>
<body class="login-page">
<form class="login-box" method="POST" action="/login">
  <h1>📚 小说评审台</h1>
  <div class="sub">请登录以继续</div>

  <label for="user">用户名</label>
  <input type="text" id="user" name="user" autofocus required value="{{ request.form.user or '' }}">

  <label for="password">密码</label>
  <input type="password" id="password" name="password" required>

  <button type="submit">登录</button>

  {% if error %}
  <div class="err">⚠ {{ error }}</div>
  {% endif %}

  <div class="hint">
    配置项: <code>review_ui.auth</code> in <code>config.yaml</code>
  </div>
</form>
</body>
</html>
